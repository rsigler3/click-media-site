    <script>
        const navContainer = document.getElementById('nav-container');
        const navbar = document.getElementById('navbar');
        const navInner = document.getElementById('nav-inner');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navContainer.classList.add('pt-6', 'px-4'); navbar.classList.remove('rounded-none'); navbar.classList.add('max-w-7xl', 'rounded-[2.5rem]', 'nav-scrolled'); navInner.classList.remove('h-20'); navInner.classList.add('h-16');
            } else {
                navContainer.classList.remove('pt-6', 'px-4'); navbar.classList.add('rounded-none'); navbar.classList.remove('max-w-7xl', 'rounded-[2.5rem]', 'nav-scrolled'); navInner.classList.add('h-20'); navInner.classList.remove('h-16');
            }
        });
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenuClose = document.getElementById('mobile-menu-close');
        const mobileMenu = document.getElementById('mobile-menu');
        function toggleMobileMenu() {
            mobileMenu.classList.toggle('opacity-0');
            mobileMenu.classList.toggle('pointer-events-none');
        }
        if (mobileMenuBtn) mobileMenuBtn.onclick = toggleMobileMenu;
        if (mobileMenuClose) mobileMenuClose.onclick = toggleMobileMenu;

        // Fetch Article Logic
        async function initArticle() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            
            if(!slug) {
                document.getElementById('article-header').innerHTML = '<h1 class="text-4xl text-white font-bold">Article not found</h1>';
                return;
            }
            
            let articles = [];
            try {
                const res = await fetch('articles.json');
                if (!res.ok) throw new Error("Failed to load");
                articles = await res.json();
            } catch(e) {
                document.getElementById('article-header').innerHTML = '<h1 class="text-4xl text-white font-bold">Error loading articles</h1>';
                return;
            }

            const pubArticles = articles.filter(a => a.status === 'published')
                .sort((a, b) => new Date(b.published_date) - new Date(a.published_date));
            const artIndex = pubArticles.findIndex(a => a.slug === slug);
            const art = artIndex !== -1 ? pubArticles[artIndex] : null;

            if (!art) {
                document.getElementById('article-header').innerHTML = '<h1 class="text-4xl text-white font-bold">Article not found or unpublished</h1>';
                return;
            }

            // Populate metadata
            document.title = (art.seo_title || art.title) + " | Click Media & Marketing";
            document.getElementById('page-desc').content = art.seo_description || "";

            // Populate content
            const date = new Date(art.published_date).toLocaleDateString('en-US', {month: 'long', day: 'numeric', year: 'numeric'});
            
            document.getElementById('article-header').innerHTML = `
                <div class="flex items-center justify-center text-sm text-white font-bold tracking-widest uppercase mb-6">
                    <span>${date}</span>
                </div>
                <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight text-white leading-tight mb-8">
                    ${art.title}
                </h1>
            `;
            
            document.getElementById('article-body').innerHTML = art.content;
            
            document.getElementById('author-box').classList.remove('hidden');
            if(art.author) document.getElementById('author-name').textContent = art.author;

            // Calculate Next/Prev Articles
            const nextArt = artIndex > 0 ? pubArticles[artIndex - 1] : null; // newer
            const prevArt = artIndex < pubArticles.length - 1 ? pubArticles[artIndex + 1] : null; // older

            let navHtml = '';
            if (prevArt) {
                navHtml += `<a href="article.html?slug=${prevArt.slug}" class="group flex-1 w-full text-left bg-white/5 hover:bg-white/10 p-6 rounded-2xl transition-all border border-white/5 hover:border-white/10">
                                <div class="text-xs text-gray-400 mb-2 uppercase tracking-widest flex items-center gap-2"><span class="material-symbols-outlined text-sm">arrow_back</span> Previous</div>
                                <div class="text-white font-bold text-lg line-clamp-2 group-hover:text-primary transition-colors">${prevArt.title}</div>
                            </a>`;
            } else { navHtml += `<div class="flex-1 w-full"></div>`; }
            
            if (nextArt) {
                navHtml += `<a href="article.html?slug=${nextArt.slug}" class="group flex-1 w-full text-right bg-white/5 hover:bg-white/10 p-6 rounded-2xl transition-all border border-white/5 hover:border-white/10">
                                <div class="text-xs text-gray-400 mb-2 uppercase tracking-widest flex items-center justify-end gap-2">Next <span class="material-symbols-outlined text-sm">arrow_forward</span></div>
                                <div class="text-white font-bold text-lg line-clamp-2 group-hover:text-primary transition-colors">${nextArt.title}</div>
                            </a>`;
            } else { navHtml += `<div class="flex-1 w-full"></div>`; }

            if(prevArt || nextArt) {
                document.getElementById('article-nav').innerHTML = navHtml;
                document.getElementById('article-nav').classList.remove('hidden');
            }

            // Generate JSON-LD Schema
            const schema = {
                "@context": "https://schema.org",
                "@graph": [
                    {
                        "@type": "Article",
                        "headline": art.seo_title || art.title,
                        "description": art.seo_description || "",
                        "author": { "@type": "Person", "name": art.author || "Click Media Team" },
                        "datePublished": art.published_date,
                        "dateModified": art.updated_at,
                        "publisher": {
                            "@type": "Organization",
                            "name": "Click Media & Marketing",
                            "logo": {
                                "@type": "ImageObject",
                                "url": "https://www.clickmediaandmarketing.com/images/Small%20White%20Click%20Logo.webp"
                            }
                        }
                    }
                ]
            };

            // Add FAQ Schema if present
            if(art.schema_faq && art.schema_faq.length > 0) {
                schema['@graph'].push({
                    "@type": "FAQPage",
                    "mainEntity": art.schema_faq.map(f => ({
                        "@type": "Question",
                        "name": f.question,
                        "acceptedAnswer": {
                            "@type": "Answer",
                            "text": f.answer
                        }
                    }))
                });
            }

            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.text = JSON.stringify(schema);
            document.head.appendChild(script);
        }

        initArticle();
    </script>
