name: Sync Articles from Supabase

on:
  push:
    branches:
      - main
  schedule:
    # Run every 4 hours automatically to catch new blog posts
    - cron: '0 */4 * * *'
  # Allow running the workflow manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Required to allow committing changes back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Run sync script
        run: node sync-articles.js
        
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated sync of articles.json from Supabase" && git push)
